# ============================================================
#  AutoPlugin v1.0 — config.yml
# ============================================================

settings:
  # Якщо гравець відходить далі ніж X блоків — прогрес скидається
  leave-distance: 10
  # Повідомлення в ActionBar
  actionbar-enabled: true

# ── Авто-шахта ───────────────────────────────────────────────
mine:
  # Час оновлення шахти (секунди)
  reset-time: 300
  # Розмір шахти (NxN)
  size: 15
  # Висота шахти
  depth: 10
  # Заробіток за блок (Vault)
  rewards:
    DIAMOND_ORE:    50.0
    EMERALD_ORE:    45.0
    GOLD_ORE:       15.0
    IRON_ORE:       5.0
    LAPIS_ORE:      8.0
    COAL_ORE:       1.0
    DEEPSLATE_DIAMOND_ORE: 55.0
    DEEPSLATE_GOLD_ORE:    18.0
    DEEPSLATE_IRON_ORE:    6.0
    DEEPSLATE_LAPIS_ORE:   9.0
    DEEPSLATE_COAL_ORE:    1.5
  # Шанси блоків (від 0.0 до 1.0, сума = 1.0)
  composition:
    COAL_ORE: 0.30
    IRON_ORE: 0.25
    LAPIS_ORE: 0.12
    GOLD_ORE: 0.12
    EMERALD_ORE: 0.08
    DIAMOND_ORE: 0.08
    STONE: 0.05
  # Нижні шари (deepslate)
  deep-composition:
    DEEPSLATE_COAL_ORE: 0.20
    DEEPSLATE_IRON_ORE: 0.20
    DEEPSLATE_LAPIS_ORE: 0.12
    DEEPSLATE_GOLD_ORE: 0.15
    DEEPSLATE_DIAMOND_ORE: 0.13
    DEEPSLATE_EMERALD_ORE: 0.10
    DEEPSLATE: 0.10

# ── Авто-лісоруб ─────────────────────────────────────────────
forest:
  # Час оновлення (секунди)
  reset-time: 50
  # Скільки разів треба зрубати одне дерево
  chops-required: 5
  # Заробіток за дерево
  rewards:
    OAK_LOG:      3.0
    BIRCH_LOG:    3.0
    SPRUCE_LOG:   3.5
    JUNGLE_LOG:   4.0
    ACACIA_LOG:   3.5
    DARK_OAK_LOG: 4.5
    MANGROVE_LOG: 5.0
    CHERRY_LOG:   6.0
  # Типи дерев у лісі
  tree-types:
    - OAK
    - BIRCH
    - SPRUCE

# ── Авто-ферма ───────────────────────────────────────────────
farm:
  # Час оновлення (секунди)
  reset-time: 180
  # Заробіток за урожай
  rewards:
    WHEAT:      2.0
    CARROT:     2.5
    POTATO:     2.0
    BEETROOT:   3.0
    MELON:      4.0
    PUMPKIN:    4.0
    MELON_SLICE: 1.0
  # Розмір ферми
  width: 9
  length: 9
  # Культури (рівні вага)
  crops:
    - WHEAT
    - CARROTS
    - POTATOES
    - BEETROOTS
    - MELON_STEM
    - PUMPKIN_STEM

# ── Скорборд ─────────────────────────────────────────────────
scoreboard:
  enabled: true
  title: "&6&lАвто-блоки"
  update-ticks: 20
  lines:
    - "&7Баланс: &e{balance}"
    - "&7Шахта: &a{mine_status}"
    - "&7Ліс: &a{forest_status}"
    - "&7Ферма: &a{farm_status}"
    - ""
    - "&7Гравців онлайн: &e{online}"

# ── NPC ──────────────────────────────────────────────────────
npc:
  # Дистанція для взаємодії
  interact-distance: 3.0
  # Показувати ім'я
  show-name: true
  name-color: "&e"
