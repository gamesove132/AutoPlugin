# ============================================================
#  AutoPlugin v2.0 — config.yml
# ============================================================

settings:
  leave-distance: 10
  actionbar-enabled: true

# ── Авто-шахта ───────────────────────────────────────────────
mine:
  reset-time: 300
  size: 15
  depth: 10
  # Заробіток відповідно до запиту:
  # Алмаз=100, Лазурит=50, Редстоун=45, Золото=25, Залізо=20, Вугілля=10
  rewards:
    DIAMOND_ORE:              100.0
    EMERALD_ORE:               80.0
    LAPIS_ORE:                 50.0
    REDSTONE_ORE:              45.0
    GOLD_ORE:                  25.0
    IRON_ORE:                  20.0
    COAL_ORE:                  10.0
    DEEPSLATE_DIAMOND_ORE:    110.0
    DEEPSLATE_EMERALD_ORE:     85.0
    DEEPSLATE_LAPIS_ORE:       55.0
    DEEPSLATE_REDSTONE_ORE:    48.0
    DEEPSLATE_GOLD_ORE:        28.0
    DEEPSLATE_IRON_ORE:        22.0
    DEEPSLATE_COAL_ORE:        12.0
    STONE:                      0.0
  # Склад шахти: БАГАТО КАМЕНЮ (0.50), решта руд
  composition:
    STONE:        0.50
    COAL_ORE:     0.15
    IRON_ORE:     0.12
    LAPIS_ORE:    0.08
    REDSTONE_ORE: 0.07
    GOLD_ORE:     0.04
    EMERALD_ORE:  0.02
    DIAMOND_ORE:  0.02
  # Глибокий шар теж з каменем
  deep-composition:
    DEEPSLATE:              0.45
    DEEPSLATE_COAL_ORE:     0.12
    DEEPSLATE_IRON_ORE:     0.12
    DEEPSLATE_LAPIS_ORE:    0.08
    DEEPSLATE_REDSTONE_ORE: 0.09
    DEEPSLATE_GOLD_ORE:     0.06
    DEEPSLATE_EMERALD_ORE:  0.04
    DEEPSLATE_DIAMOND_ORE:  0.04

# ── Авто-лісоруб ─────────────────────────────────────────────
forest:
  reset-time: 50
  chops-required: 5
  # Розмір поля лісу (NxN). Більше = більше дерев
  size: 15
  rewards:
    OAK_LOG:      3.0
    BIRCH_LOG:    3.0
    SPRUCE_LOG:   3.5
  # tree-types НЕ використовується (вшито в код: дуб, береза, ялина)

# ── Авто-ферма ───────────────────────────────────────────────
farm:
  reset-time: 180
  rewards:
    WHEAT:       2.0
    CARROTS:     2.5
    CARROT:      2.5
    POTATOES:    2.0
    POTATO:      2.0
    BEETROOTS:   3.0
    BEETROOT:    3.0
    MELON:       4.0
    PUMPKIN:     4.0
  width:  9
  length: 9
  # Тільки класичні овочі + кавун/гарбуз
  crops:
    - WHEAT
    - CARROTS
    - POTATOES
    - BEETROOTS
    - MELON_STEM
    - PUMPKIN_STEM

# ── Скорборд ─────────────────────────────────────────────────
scoreboard:
  enabled: true
  update-ticks: 20
  # lines використовуються тільки як fallback; реальні лінії генеруються в коді

# ── NPC ──────────────────────────────────────────────────────
npc:
  interact-distance: 3.0
  show-name: true
  name-color: "&e"
